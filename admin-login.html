<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Trans-Nzoia Community ICT Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>

    /* ── Reset & Tokens ───────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #003049;
      --navy-dark:  #001f30;
      --navy-mid:   #004060;
      --red:        #D62828;
      --red-hover:  #bf2020;
      --orange:     #F77F00;
      --amber:      #FCBF49;
      --amber-pale: #FFF5D6;
      --text:       #1A1A1A;
      --muted:      #5C5040;
      --border:     #E8D8C0;
      --white:      #FFFFFF;
      --error:      #e53935;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy-dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1, h2, h3 { font-family: 'Poppins', sans-serif; }

    /* ── Login Card ───────────────────────────────── */
    .login-card {
      background: var(--white);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    /* Top accent bar */
    .login-card::before {
      content: '';
      display: block;
      height: 4px;
      background: linear-gradient(90deg, var(--red), var(--orange), var(--amber));
      border-radius: 4px 4px 0 0;
      margin: -2.5rem -2rem 2rem;
      border-radius: 16px 16px 0 0;
    }

    /* Logo row */
    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.8rem;
    }

    .login-logo-badge {
      width: 44px;
      height: 44px;
      background: var(--red);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      color: var(--white);
      font-size: 1rem;
      flex-shrink: 0;
    }

    .login-logo-text {
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.3;
    }

    .login-logo-text small {
      display: block;
      font-size: 0.62rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    /* Heading */
    .login-heading {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 0.3rem;
    }

    .login-sub {
      font-size: 0.83rem;
      color: var(--muted);
      margin-bottom: 1.8rem;
      line-height: 1.5;
    }

    /* Form groups */
    .form-group {
      margin-bottom: 1.1rem;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 5px;
    }

    .form-input {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: var(--red);
    }

    .form-input::placeholder {
      color: #bbb;
    }

    /* Password toggle */
    .password-wrap {
      position: relative;
    }

    .password-wrap .form-input {
      padding-right: 44px;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      padding: 2px 4px;
      transition: color 0.2s;
    }

    .toggle-pw:hover {
      color: var(--navy);
    }

    /* Error message */
    .error-msg {
      background: #FDECEA;
      border: 1px solid #FFCDD2;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8rem;
      color: var(--error);
      margin-bottom: 1rem;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    /* Submit button */
    .login-btn {
      width: 100%;
      background: var(--red);
      color: var(--white);
      border: none;
      padding: 13px;
      border-radius: 10px;
      font-size: 0.97rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      margin-top: 0.5rem;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.1s;
    }

    .login-btn:hover  { background: var(--red-hover); }
    .login-btn:active { transform: scale(0.99); }

    /* Loading state */
    .login-btn.loading {
      opacity: 0.7;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* Footer note */
    .login-note {
      text-align: center;
      font-size: 0.74rem;
      color: rgba(255,255,255,0.35);
      margin-top: 1.5rem;
    }

  </style>
</head>
<body>

  <!-- ================================================
       LOGIN CARD
  ================================================ -->
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-badge">TN</div>
      <div class="login-logo-text">
        Trans-Nzoia Community ICT Hub
        <small>Admin Portal</small>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="login-heading">Welcome back</h1>
    <p class="login-sub">Sign in to access the admin dashboard and manage enrollments.</p>

    <!-- Error message (shown by JS on bad credentials) -->
    <div class="error-msg" id="errorMsg">
      Incorrect username or password. Please try again.
    </div>

    <!-- Login form -->
    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input
        class="form-input"
        type="text"
        id="username"
        placeholder="Enter your admin username"
        autocomplete="username"
      >
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="password-wrap">
        <input
          class="form-input"
          type="password"
          id="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter') handleLogin()"
        >
        <button class="toggle-pw" onclick="togglePassword()" type="button" id="togglePwBtn">Show</button>
      </div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="handleLogin()">
      Sign In to Admin Panel
    </button>

  </div>

  <p class="login-note">
    Restricted access &mdash; authorised personnel only.
  </p>


  <!-- ================================================
       JAVASCRIPT
  ================================================ -->
  <script>

    /* ── Password visibility toggle ─────────────────── */
    function togglePassword() {
      var input  = document.getElementById('password');
      var btn    = document.getElementById('togglePwBtn');
      var isHide = input.type === 'password';
      input.type = isHide ? 'text' : 'password';
      btn.textContent = isHide ? 'Hide' : 'Show';
    }


    /* ── Login handler ───────────────────────────────── */
    /*
      NOTE FOR BACKEND INTEGRATION:
      Replace the hardcoded check below with a real POST request
      to your backend API endpoint, e.g.:

        fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        })
        .then(res => res.json())
        .then(data => {
          if (data.token) {
            localStorage.setItem('adminToken', data.token);
            window.location.href = 'admin.html';
          } else {
            showError();
          }
        });

      The hardcoded credentials below are for frontend demo only.
      Remove them before going live.
    */

    var DEMO_USER = 'admin';
    var DEMO_PASS = 'tnict2025';

    function handleLogin() {
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var btn      = document.getElementById('loginBtn');
      var errorMsg = document.getElementById('errorMsg');

      /* Hide previous error */
      errorMsg.classList.remove('show');

      /* Basic empty-field check */
      if (!username || !password) {
        errorMsg.textContent = 'Please enter both your username and password.';
        errorMsg.classList.add('show');
        return;
      }

      /* Show loading state */
      btn.textContent = 'Signing in...';
      btn.classList.add('loading');

      /* Simulate network delay then check credentials */
      setTimeout(function () {
        btn.textContent = 'Sign In to Admin Panel';
        btn.classList.remove('loading');

        if (username === DEMO_USER && password === DEMO_PASS) {
          /* Store a simple session flag and redirect */
          sessionStorage.setItem('adminLoggedIn', 'true');
          sessionStorage.setItem('adminUser', username);
          window.location.href = 'admin.html';
        } else {
          errorMsg.textContent = 'Incorrect username or password. Please try again.';
          errorMsg.classList.add('show');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      }, 800);
    }

  </script>

</body>
</html>
